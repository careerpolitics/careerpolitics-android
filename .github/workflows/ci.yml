name: Android CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 secret not set — using placeholder"
            echo '{"project_info":{"project_number":"000","project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:000:android:000","android_client_info":{"package_name":"com.murari.careerpolitics"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/google-services.json
          else
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          fi

      - name: Run Android Lint
        run: ./gradlew lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup secrets
        if: always()
        run: rm -f app/google-services.json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo '{"project_info":{"project_number":"000","project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:000:android:000","android_client_info":{"package_name":"com.murari.careerpolitics"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/google-services.json
          else
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          fi

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup secrets
        if: always()
        run: rm -f app/google-services.json

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x ./gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo '{"project_info":{"project_number":"000","project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:000:android:000","android_client_info":{"package_name":"com.murari.careerpolitics"}},"api_key":[{"current_key":"placeholder"}]}]}' > app/google-services.json
          else
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Report APK size
        id: apk-size
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          SIZE_BYTES=$(stat -c%s "$APK_PATH")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"
          echo "📦 Debug APK size: ${SIZE_MB} MB ($SIZE_BYTES bytes)"

      - name: APK size guard (fail if > 60 MB)
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          SIZE_BYTES=$(stat -c%s "$APK_PATH")
          MAX_BYTES=62914560  # 60 MiB (60 × 1024 × 1024)
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "❌ APK size ($SIZE_BYTES bytes) exceeds 60 MB limit" >&2
            exit 1
          fi
          echo "✅ APK size is within the 60 MB limit."

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup secrets
        if: always()
        run: rm -f app/google-services.json