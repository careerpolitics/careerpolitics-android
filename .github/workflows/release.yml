name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track to deploy to'
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta, production]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'
  PACKAGE_NAME: com.murari.careerpolitics

jobs:

  build:
    name: Build signed release
    runs-on: ubuntu-latest
    outputs:
      version-name: ${{ steps.version.outputs.name }}
      version-code: ${{ steps.version.outputs.code }}
      aab-size-mb:  ${{ steps.size.outputs.aab_mb }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew

      - name: Validate required secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          MISSING=""
          for var in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD GOOGLE_SERVICES_JSON_BASE64; do
            if [ -z "${!var}" ]; then MISSING="$MISSING $var"; fi
          done
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING" >&2
            echo "   See .github/CI-CD.md for setup instructions." >&2
            exit 1
          fi

      - name: Decode signing keystore and Firebase config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json

      - name: Extract version info
        id: version
        run: |
          NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]//g')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "📌 Building v$NAME ($CODE)"

      - name: Run lint
        env:
          KEYSTORE_PATH: release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew lintRelease

      - name: Run unit tests
        env:
          KEYSTORE_PATH: release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew testReleaseUnitTest

      - name: Build signed release APK and AAB
        env:
          KEYSTORE_PATH: release-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Report artifact sizes
        id: size
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          APK_MB=$(echo "scale=2; $(stat -c%s "$APK") / 1048576" | bc)
          AAB_MB=$(echo "scale=2; $(stat -c%s "$AAB") / 1048576" | bc)
          echo "aab_mb=$AAB_MB" >> "$GITHUB_OUTPUT"
          echo "📦 APK: ${APK_MB} MB  |  AAB: ${AAB_MB} MB"

      - name: AAB size guard (fail if > 150 MB — Play Store limit)
        run: |
          AAB="app/build/outputs/bundle/release/app-release.aab"
          SIZE=$(stat -c%s "$AAB")
          MAX=157286400  # 150 MB
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "❌ AAB ($SIZE bytes) exceeds Play Store 150 MB limit" >&2
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
          retention-days: 365

      - name: Cleanup secrets
        if: always()
        run: rm -f app/release-keystore.jks app/google-services.json

  deploy:
    name: Deploy to Play Store
    runs-on: ubuntu-latest
    needs: build
    environment: play-store

    steps:
      - name: Determine target track
        id: track
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TRACK="${{ github.event.inputs.track }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TRACK="production"
          else
            TRACK="internal"
          fi
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"
          echo "🎯 Deploying to: $TRACK"

      - name: Determine rollout strategy
        id: rollout
        run: |
          TRACK="${{ steps.track.outputs.track }}"
          if [ "$TRACK" = "production" ]; then
            echo "fraction=0.2" >> "$GITHUB_OUTPUT"
            echo "status=inProgress" >> "$GITHUB_OUTPUT"
            echo "📊 Production staged rollout: 20%"
          else
            echo "fraction=" >> "$GITHUB_OUTPUT"
            echo "status=completed" >> "$GITHUB_OUTPUT"
            echo "📊 Full rollout for $TRACK track"
          fi

      - name: Decode Google Play service account key
        env:
          SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          if [ -z "$SERVICE_ACCOUNT_JSON_BASE64" ]; then
            echo "❌ Missing SECRET: SERVICE_ACCOUNT_JSON_BASE64" >&2
            echo "   Cannot deploy without Play Store service account." >&2
            exit 1
          fi
          echo "$SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > service-account.json

      - name: Download release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: dist

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: dist/app-release.aab
          track: ${{ steps.track.outputs.track }}
          status: ${{ steps.rollout.outputs.status }}
          inAppUpdatePriority: 2
          releaseName: "v${{ needs.build.outputs.version-name }} (${{ needs.build.outputs.version-code }})"
          userFraction: ${{ steps.rollout.outputs.fraction || '' }}

      - name: Cleanup service account key
        if: always()
        run: rm -f service-account.json

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: dist

      - name: Download ProGuard mapping
        uses: actions/download-artifact@v4
        with:
          name: release-mapping
          path: dist

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges -20)
          else
            LOG=$(git log --oneline --no-merges "$PREV_TAG"..HEAD)
          fi

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          echo "$LOG" | while IFS= read -r line; do
            echo "- $line" >> changelog.md
          done
          echo "" >> changelog.md
          echo "**AAB size:** ${{ needs.build.outputs.aab-size-mb }} MB" >> changelog.md
          echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG:-HEAD~20}...${{ github.ref_name }}" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.build.outputs.version-name }}"
          body_path: changelog.md
          files: |
            dist/app-release.apk
            dist/mapping.txt
          draft: false
          prerelease: false