name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump-type:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  bump:
    name: Bump version and create tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the tag push triggers the release workflow.
          # GITHUB_TOKEN does NOT trigger other workflows by design.
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]//g')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "📌 Current: v$VERSION_NAME ($VERSION_CODE)"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.name }}"
          CURRENT_CODE=${{ steps.current.outputs.code }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.bump-type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_NAME="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$((CURRENT_CODE + 1))

          echo "name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "🆕 New: v$NEW_NAME ($NEW_CODE)"

      - name: Update build.gradle.kts
        run: |
          sed -i "s/versionCode = ${{ steps.current.outputs.code }}/versionCode = ${{ steps.new.outputs.code }}/" app/build.gradle.kts
          sed -i 's/versionName = "${{ steps.current.outputs.name }}"/versionName = "${{ steps.new.outputs.name }}"/' app/build.gradle.kts

          echo "Updated build.gradle.kts:"
          grep -E 'versionCode|versionName' app/build.gradle.kts | head -2

      - name: Commit and tag
        run: |
          git add app/build.gradle.kts
          git commit -m "chore: bump version to v${{ steps.new.outputs.name }} (${{ steps.new.outputs.code }})"
          git tag "v${{ steps.new.outputs.name }}"
          git push origin main
          git push origin "v${{ steps.new.outputs.name }}"

      - name: Summary
        run: |
          echo "## Version Bumped 🚀" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Old | New |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **versionName** | ${{ steps.current.outputs.name }} | ${{ steps.new.outputs.name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **versionCode** | ${{ steps.current.outputs.code }} | ${{ steps.new.outputs.code }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag \`v${{ steps.new.outputs.name }}\` pushed — release pipeline will trigger automatically." >> "$GITHUB_STEP_SUMMARY"